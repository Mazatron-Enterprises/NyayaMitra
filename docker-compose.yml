version: '3.9'
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: nyayamitra-db
    environment:
      POSTGRES_DB: nyayamitra
      POSTGRES_USER: nyayamitra
      POSTGRES_PASSWORD: nyayamitra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyayamitra -d nyayamitra"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
